# Benten: run daily countdown (100→67) via Telegram user bot.
# Cron is in UTC. 06:00 UTC = 12:00 Asia/Almaty.
name: Daily countdown

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install project
        run: uv sync --locked --no-editable

      - name: Write config from secret
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: printf '%s' "$CONFIG_YAML" > config.yaml

      - name: Run countdown
        env:
          TELEGRAM_APP_ID: ${{ secrets.TELEGRAM_APP_ID }}
          TELEGRAM_APP_HASH: ${{ secrets.TELEGRAM_APP_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: uv run python main.py
